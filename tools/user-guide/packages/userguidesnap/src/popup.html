<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 248px; margin: 0; font-family: 'Inter', system-ui, sans-serif; color: #17191e; padding: 14px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .mk { width: 22px; height: 22px; border-radius: 6px; background: linear-gradient(140deg, #2bd996, #00a36b); }
  .t { font-weight: 700; font-size: 13px; letter-spacing: -.02em; }
  .t small { display: block; font-family: ui-monospace, monospace; font-size: 8px; letter-spacing: .16em; text-transform: uppercase; color: #067a55; margin-top: 1px; }
  button { width: 100%; font-family: inherit; font-size: 13px; font-weight: 600; padding: 9px; border-radius: 9px; cursor: pointer; margin-bottom: 7px; border: 1px solid #dbdad6; background: #fff; }
  button.primary { background: #00a36b; color: #fff; border-color: #00a36b; }
  .hint { font-size: 11px; color: #7c818b; line-height: 1.45; margin: 4px 0 0; }
  .kbd { font-family: ui-monospace, monospace; font-size: 10px; background: #f6f6f4; border: 1px solid #e8e7e4; border-radius: 4px; padding: 1px 4px; }
</style>
</head>
<body>
  <div class="row"><span class="mk"></span><span class="t">userGuideSnap<small>snap · annotate</small></span></div>
  <button class="primary" id="capture">📸 Snap visible tab → add slide</button>
  <button id="open">Open userGuideSnap editor</button>
  <p class="hint">Capture appends a slide to your open guide. Shortcut: <span class="kbd">Alt+Shift+S</span>. Then annotate in the editor tab.</p>
  <p class="hint" id="status" style="color:#067a55;min-height:14px"></p>
  <script src="popup.js"></script>
</body>
</html>
