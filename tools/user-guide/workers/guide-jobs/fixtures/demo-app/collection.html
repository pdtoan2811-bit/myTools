<!doctype html><html><head><meta charset="utf-8"><title>Demo App — Collection</title>
<style>
  body{margin:0;font-family:-apple-system,Inter,sans-serif;background:#f6f7f9;color:#17191e}
  .top{display:flex;align-items:center;gap:10px;padding:14px 22px;background:#fff;border-bottom:1px solid #e9eaed}
  .mk{width:22px;height:22px;border-radius:6px;background:linear-gradient(140deg,#2bd996,#00a36b)}
  .top b{font-size:15px}.top .sp{flex:1}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:#067a55;background:#eef5f1;border:1px solid #cbe8da;border-radius:999px;padding:7px 12px}
  .main{padding:26px 32px}h1{font-size:22px;margin:0 0 18px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;max-width:920px}
  .p{background:#fff;border:1px solid #e9eaed;border-radius:12px;overflow:hidden}
  .im{aspect-ratio:1;background:linear-gradient(160deg,#f1f5f2,#e6efe9);position:relative}
  .rank{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:#00a36b;color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
  .meta{padding:10px 12px}.nm{font-size:13px;font-weight:600}.pr{font-size:12px;color:#7a818b;margin-top:3px}
</style></head><body>
<div class="top"><span class="mk"></span><b>Demo Store Admin</b><span class="sp"></span><span class="pill">● Sorted by Best sellers</span></div>
<div class="main"><h1>Collection · Bestsellers</h1>
  <div class="grid">
    <div class="p" id="top-product"><div class="im"><span class="rank">1</span></div><div class="meta"><div class="nm">Aurora Sneaker</div><div class="pr">$129 · 142 sold</div></div></div>
    <div class="p"><div class="im"><span class="rank">2</span></div><div class="meta"><div class="nm">Wool Overcoat</div><div class="pr">$240 · 98 sold</div></div></div>
    <div class="p"><div class="im"><span class="rank">3</span></div><div class="meta"><div class="nm">Leather Tote</div><div class="pr">$180 · 76 sold</div></div></div>
    <div class="p"><div class="im"><span class="rank">4</span></div><div class="meta"><div class="nm">Ribbed Sweater</div><div class="pr">$95 · 64 sold</div></div></div>
  </div>
</div></body></html>
