<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Guide Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/editor/tokens.css">
<style>
  *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:#eceae6;overflow:hidden}
  .app{display:grid;grid-template-columns:270px 1fr;grid-template-rows:56px 1fr;height:100vh}
  .top{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 18px;background:#fff;border-bottom:1px solid var(--line)}
  .logo{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-.02em;font-size:15px}
  .logo .mk{width:24px;height:24px;border-radius:7px;background:linear-gradient(140deg,var(--green-bright),var(--green))}
  .logo small{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--green-ink);display:block;margin-top:2px}
  .spacer{flex:1} .hint{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .rail{background:#f4f3f0;border-right:1px solid var(--line);overflow-y:auto;padding:12px}
  .rail h3{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:6px 6px 10px}
  .job{border:1.5px solid var(--line);border-radius:11px;background:#fff;padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:all .15s var(--ease)}
  .job:hover{border-color:var(--line-2)} .job.on{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,163,107,.14)}
  .job .t{font-weight:600;font-size:13.5px;letter-spacing:-.01em}
  .job .m{display:flex;align-items:center;gap:8px;margin-top:6px;font-family:var(--mono);font-size:10.5px;color:var(--muted)}
  .state{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:999px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .state.ready{color:var(--green-ink);background:var(--green-soft)} .state.draft{color:var(--muted);background:var(--paper)}
  .state.error{color:var(--down);background:#fbeceb} .state.capturing,.state.rendering,.state.assembling{color:#9a6b00;background:#fdf6e3}
  .main{display:flex;flex-direction:column;overflow:hidden}
  .bar{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--line);background:#fff}
  .bar .ttl{font-weight:600;font-size:14px} .bar .spacer{flex:1}
  .btn{font-size:13px;font-weight:600;border-radius:9px;padding:8px 13px;cursor:pointer;border:1px solid var(--line-2);background:#fff;color:var(--ink)}
  .btn:hover{background:var(--paper)} .btn.green{background:var(--green);color:#fff;border-color:var(--green)} .btn.green:hover{background:var(--green-ink)}
  .btn.ink{background:var(--ink);color:#fff;border-color:var(--ink)} .btn:disabled{opacity:.5;cursor:default}
  .split{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0}
  textarea#md{border:none;outline:none;resize:none;padding:22px 24px;font-family:var(--mono);font-size:13px;line-height:1.65;color:var(--ink-2);background:#faf9f7;border-right:1px solid var(--line)}
  .preview{overflow-y:auto;padding:30px 38px;background:#fff}
  .empty{display:grid;place-items:center;height:100%;color:var(--muted);font-size:14px}
  /* rendered markdown */
  .doc h1{font-family:'Playfair Display',serif;font-weight:600;font-size:30px;letter-spacing:-.02em;margin:0 0 14px}
  .doc h2{font-size:20px;letter-spacing:-.02em;margin:30px 0 12px}
  .doc p{font-size:15px;line-height:1.6;color:var(--ink-2);margin:0 0 14px}
  .doc img{max-width:100%;border-radius:12px;border:1px solid var(--line);box-shadow:var(--shadow-float);margin:6px 0 18px;display:block}
  .doc blockquote{margin:0 0 16px;padding:12px 16px;border-left:3px solid var(--green);background:var(--green-soft);border-radius:0 10px 10px 0;font-size:14px;color:var(--ink-2)}
  .doc code{font-family:var(--mono);font-size:.88em;background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:1px 5px}
  .doc strong{font-weight:700;color:var(--ink)} .doc a{color:var(--green-ink);text-decoration:underline}
  .doc ul,.doc ol{margin:0 0 14px;padding-left:22px;font-size:15px;color:var(--ink-2);line-height:1.6}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:10px 16px;border-radius:9px;box-shadow:var(--shadow-float);opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="logo"><span class="mk"></span><span>Guide Studio <small>Claude-built guides</small></span></div>
    <div class="spacer"></div>
    <span class="hint">author with <b>/guide</b> in Claude Code · review &amp; edit here</span>
  </header>
  <aside class="rail"><h3>Guides <span id="count"></span></h3><div id="jobs"></div></aside>
  <main class="main">
    <div class="bar">
      <span class="ttl" id="title">Select a guide</span>
      <span class="spacer"></span>
      <button class="btn" id="save" disabled>Save markdown</button>
      <button class="btn" id="images" disabled>✎ Edit images</button>
      <button class="btn green" id="rerender" disabled>↻ Re-render</button>
    </div>
    <div class="split">
      <textarea id="md" spellcheck="false" placeholder="Select a guide on the left…"></textarea>
      <div class="preview"><div id="doc" class="doc"><div class="empty">Pick a guide to preview it here.</div></div></div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="studio.js"></script>
</body>
</html>
